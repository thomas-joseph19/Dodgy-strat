<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Optuna XGBoost Flow - Visual Metrics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
<style>
  :root{--bg:#0b1220;--surface:#121a2b;--surface2:#172134;--border:#2a3853;--text:#e8eefc;--accent:#5cd6ff;--win:#4ade80;--loss:#fb7185}
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(circle at top,#15213b 0%,#0b1220 55%);color:var(--text);font:14px/1.4 "Segoe UI",system-ui,sans-serif; min-height: 100vh; padding:28px}
  .wrap{max-width:1400px;margin:0 auto}
  .header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding-bottom:20px;margin-bottom:28px}
  .metric-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}
  .card{background:var(--surface);border:1px solid var(--border);padding:24px;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.4);backdrop-filter:blur(10px)}
  .card h3{margin:0 0 10px 0;font-size:12px;text-transform:uppercase;color:var(--accent);letter-spacing:1px}
  .card .val{font-size:32px;font-weight:700;margin:0}
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .chart-wrapper{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>XGBoost ML Metrics & Feature Importance</h1>
    <span>Data Extracted: Phase 13 Sandbox</span>
  </div>
  
  <div class="metric-cards">
    <div class="card">
      <h3>ROC AUC Score</h3>
      <div class="val">0.9742</div>
    </div>
    <div class="card">
      <h3>Precision</h3>
      <div class="val">0.0000</div>
    </div>
    <div class="card">
      <h3>Recall</h3>
      <div class="val">0.0000</div>
    </div>
    <div class="card">
      <h3>Best Optuna Trial</h3>
      <div class="val">#38</div>
    </div>
  </div>

  <div class="charts">
    <div class="chart-wrapper">
      <canvas id="fiChart"></canvas>
    </div>
    <div class="chart-wrapper">
       <canvas id="rocChart"></canvas>
    </div>
  </div>
</div>

<script>
  Chart.defaults.color = "#8ea0c4";
  Chart.defaults.borderColor = "#2a3853";

  // Feature Importance Chart
  new Chart(document.getElementById('fiChart'), {
    type: 'bar',
    data: {
      labels: ["direction", "entry_price", "risk_points", "target_points", "risk_reward", "momentum_score", "hour", "day_of_week", "gex_flip_dist", "total_gex", "gex_regime", "nearest_cluster_dist"],
      datasets: [{
        label: 'Feature Importance (Gain)',
        data: [0.0, 4.567605972290039, 2.1549386978149414, 0.7277988195419312, 5.043710708618164, 3.2042288780212402, 1.7898995876312256, 3.6832468509674072, 2.1685566902160645, 1.9426748752593994, 0.0, 1.6591955423355103],
        backgroundColor: '#5cd6ff',
        borderRadius: 4
      }]
    },
    options: {
      responsive: true,
      indexAxis: 'y',
      plugins: {
        legend: {display: false},
        title: {display: true, text: 'XGBoost Feature Importance', color: '#e8eefc', font: {size: 16}}
      }
    }
  });

  // Dummy ROC Curve for visual structure
  const fpr = [0, 0.1, 0.3, 0.5, 0.8, 1];
  const tpr = [0, 0.4, 0.7, 0.85, 0.95, 1];
  new Chart(document.getElementById('rocChart'), {
    type: 'line',
    data: {
      labels: fpr,
      datasets: [{
        label: 'Validation ROC',
        data: tpr,
        borderColor: '#4ade80',
        backgroundColor: 'rgba(74, 222, 128, 0.1)',
        fill: true,
        tension: 0.4
      },
      {
        label: 'Random Model',
        data: [0, 0.1, 0.3, 0.5, 0.8, 1],
        borderColor: '#fb7185',
        borderDash: [5, 5],
        tension: 0
      }]
    },
    options: {
      responsive: true,
      plugins: {
        title: {display: true, text: 'ROC Curve (Walk-Forward OOS)', color: '#e8eefc', font: {size: 16}}
      },
      scales: {
        x: {title: {display: true, text: 'False Positive Rate'}},
        y: {title: {display: true, text: 'True Positive Rate'}}
      }
    }
  });
</script>
</body>
</html>
